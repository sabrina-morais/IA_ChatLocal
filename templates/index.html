<!DOCTYPE html>
<html lang="pt-br">

<head>

    <meta charset="UTF-8">

    <title>PrivateGPT Local</title>

    <link
        rel="stylesheet"
        href="/static/style.css"
    >

    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

</head>

<body>

<div class="app">

    <aside class="sidebar">

        <h2>🤖 PrivateGPT</h2>

        <div class="upload-card">

            <h3>Documentos</h3>

            <input
                type="file"
                id="pdf-file"
                accept=".pdf"
            >

            <button id="btn-pdf">
                📄 Enviar PDF
            </button>

            <hr>

            <input
                type="file"
                id="audio-file"
                accept=".mp3,.wav,.m4a"
            >

            <button id="btn-audio">
                🎤 Enviar Áudio
            </button>

            <hr>

            <input
                type="file"
                id="video-file"
                accept=".mp4"
            >

            <button id="btn-video">
                🎥 Enviar Vídeo
            </button>

            <hr>

            <button id="btn-ingest">
                📚 Indexar Conteúdo
            </button>

        </div>

        <button
            class="new-chat"
            id="btn-clear"
        >
            ➕ Nova Conversa
        </button>

    </aside>

    <main class="chat-container">

        <header>

            <h1>Qwen3 8B Local</h1>

            <div id="status-box">
                Sistema pronto
            </div>

        </header>

        <div id="chat-box">

            <div class="welcome">

                <h2>Bem-vindo</h2>

                <p>
                    Faça perguntas livres ou sobre
                    PDFs, áudios e vídeos indexados.
                </p>

            </div>

        </div>

        <div class="input-area">

            <textarea
                id="message"
                placeholder="Digite sua pergunta..."
            ></textarea>

            <button id="btn-send">
                🚀 Enviar
            </button>

        </div>

    </main>

</div>

<script src="/static/app.js"></script>

</body>
</html>
