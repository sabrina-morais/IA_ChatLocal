<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">

<title>Private GPT</title>

<link rel="stylesheet"
href="/static/style.css">

</head>

<body>

<div class="container">

<h1>🤖 Private GPT Qwen3 8B</h1>

<div class="toolbar">

<button onclick="clearChat()">
Nova Conversa
</button>

</div>

<div class="pdf-panel">

<input
type="file"
id="pdf-file"
accept=".pdf"
>

<button onclick="uploadPDF()">
Enviar PDF
</button>

<button onclick="ingestPDFs()">
Indexar PDF
</button>

<div id="status-box">

Sistema pronto.

</div>

</div>

<div id="chat-box"></div>

<div class="input-area">

<input
type="text"
id="message"
placeholder="Digite sua pergunta..."
>

<button onclick="sendMessage()">
Enviar
</button>

</div>

</div>

<script src="/static/app.js"></script>

</body>

</html>
